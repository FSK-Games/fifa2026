<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 Spielplan</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: white;
    margin: 0;
}

.tabs {
    display: flex;
    background: #1E1E1E;
}

.tab {
    flex: 1;
    padding: 15px;
    background: #2C2C2C;
    text-align: center;
    cursor: pointer;
}

.tab.active {
    background: #4A90E2;
}

.match-card {
    display: grid;
    grid-template-columns: 1fr 1fr 0.5fr 1fr 1fr;
    margin: 10px;
    padding: 15px;
    background: #1F1F1F;
    border-radius: 8px;
}

.home-team { display:flex; justify-content:flex-end; }
.away-team { display:flex; }

.score { text-align:center; font-weight:bold; }

.status { display:flex; justify-content:flex-end; }

.live { color:red; }

.flag { width:24px; margin-left:10px; }
.flag-left { margin-right:10px; }
</style>
</head>

<body>

<div id="tabsContainer" class="tabs"></div>
<div id="matchesContainer">Lade Spiele...</div>

<script>
let activeTabDate = null;

function loadMatches(data) {

    const currentDate = new Date().toISOString().split('T')[0];
    const matches = data.matches;

    const tabsContainer = document.getElementById('tabsContainer');
    const matchesContainer = document.getElementById('matchesContainer');

    const tabData = {};

    matches.forEach(match => {
        if (!tabData[match.localDate]) tabData[match.localDate] = [];
        tabData[match.localDate].push(match);
    });

    // ✅ KORREKTE SORTIERUNG (jetzt ohne Weebly-Probleme)
    Object.keys(tabData).forEach(date => {
        tabData[date].sort((a, b) => {
            const [h1, m1] = a.localTime.split(':').map(Number);
            const [h2, m2] = b.localTime.split(':').map(Number);
            return (h1 * 60 + m1) - (h2 * 60 + m2);
        });
    });

    tabsContainer.innerHTML = '';

    Object.keys(tabData)
        .sort((a,b)=>new Date(a)-new Date(b))
        .forEach(date => {

            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.textContent = date;
            tab.dataset.date = date;

            tabsContainer.appendChild(tab);
        });

    function renderMatches(date) {

        matchesContainer.innerHTML = '';

        tabData[date].forEach(match => {

            const card = document.createElement('div');
            card.className = 'match-card';

            const [h,m] = match.localTime.split(':');

            const time = document.createElement('div');
            time.textContent = `${parseInt(h)}:${m} Uhr`;

            const home = document.createElement('div');
            home.className = 'home-team';
            home.textContent = match.homeTeam.name;

            const hf = document.createElement('img');
            hf.src = match.homeTeam.crest;
            hf.className = 'flag';
            home.appendChild(hf);

            const score = document.createElement('div');
            score.className = 'score';

            if (match.score.home !== null && match.score.away !== null) {
                score.textContent = `${match.score.home} : ${match.score.away}`;
            } else {
                score.textContent = '- : -';
            }

            const away = document.createElement('div');
            away.className = 'away-team';

            const af = document.createElement('img');
            af.src = match.awayTeam.crest;
            af.className = 'flag flag-left';

            away.appendChild(af);
            away.append(match.awayTeam.name);

            const status = document.createElement('div');
            status.className = 'status';

            if (match.status === "IN_PLAY") {
                status.textContent = "🔴 LIVE";
                status.classList.add('live');
            }

            card.append(time, home, score, away, status);
            matchesContainer.appendChild(card);
        });
    }

    function setActiveTab() {

        const dates = Object.keys(tabData).sort((a,b)=>new Date(a)-new Date(b));

        let selectedDate = dates.find(d => d >= currentDate) || dates[dates.length-1];

        document.querySelectorAll('.tab').forEach(tab=>{
            tab.classList.toggle('active', tab.dataset.date === selectedDate);
        });

        activeTabDate = selectedDate;
        renderMatches(selectedDate);
    }

    tabsContainer.onclick = (e) => {
        if (e.target.classList.contains('tab')) {

            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

            e.target.classList.add('active');

            activeTabDate = e.target.dataset.date;
            renderMatches(activeTabDate);
        }
    };

    setActiveTab();
}

function fetchMatches() {

    document.getElementById('matchesContainer').innerHTML = "Lade Spiele...";

    fetch('https://fsk-games.github.io/fifa2026/data/matches.json')
        .then(r=>r.json())
        .then(loadMatches)
        .catch(()=>{
            document.getElementById('matchesContainer').innerHTML = "Fehler beim Laden.";
        });
}

fetchMatches();
setInterval(fetchMatches, 60000);

</script>

</body>
</html>
