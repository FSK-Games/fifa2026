name: Update WM Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      BLITZTIPPTABELLE: ${{ vars.BLITZTIPPTABELLE }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Fetch Data
        run: node fetch-wm.js
        env:
          API_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Update data" || echo "No changes"
          git push
